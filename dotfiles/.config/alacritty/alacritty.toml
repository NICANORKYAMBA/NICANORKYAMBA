import = []

[env]
TERM = "xterm-256color"

[window]
opacity = 0.95
padding = { x = 10, y = 10 }
decorations = "full"

[font]
normal = { family = "JetBrains Mono", style = "Regular" }
size = 12.0

[font.glyph_offset]
x = 0
y = 1

[colors.primary]
background = "#0a0e27"
foreground = "#e0def4"

[colors.normal]
black   = "#26233a"
red     = "#eb6f92"
green   = "#a6e22e"
yellow  = "#f8c47c"
blue    = "#7aa2f7"
magenta = "#bb9af7"
cyan    = "#5de4c7"
white   = "#e0def4"

[colors.bright]
black   = "#403d52"
red     = "#ff7a93"
green   = "#b6f292"
yellow  = "#ffd89b"
blue    = "#9ec5ff"
magenta = "#dcaaff"
cyan    = "#a4f7ff"
white   = "#fdfdf8"

[bell]
animation = "EaseOutExpo"
duration = 0

[selection]
save_to_clipboard = true

[scrollback]
lines = 10000
